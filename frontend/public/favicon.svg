<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield base with gradient -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield outline and background -->
  <path d="M 50 8 L 75 22 L 75 52 Q 75 72 50 88 Q 25 72 25 52 L 25 22 Z" fill="url(#shieldGradient)" stroke="#FFF" stroke-width="2.5"/>
  
  <!-- Alert triangle indicator (top right corner) -->
  <circle cx="70" cy="24" r="11" fill="#FFD700" stroke="#DC143C" stroke-width="2"/>
  <text x="70" y="30" font-size="16" font-weight="bold" text-anchor="middle" fill="#DC143C">!</text>
  
  <!-- Flame shape in center -->
  <g transform="translate(50, 48)">
    <!-- Outer flame - red/orange -->
    <path d="M 0 -10 Q -7 -3 -7 5 Q -7 14 0 18 Q 7 14 7 5 Q 7 -3 0 -10" fill="#FFD700" stroke="none"/>
    
    <!-- Middle flame - orange -->
    <path d="M 0 -6 Q -4 -1 -4 4 Q -4 10 0 13 Q 4 10 4 4 Q 4 -1 0 -6" fill="#FF8C00" stroke="none"/>
    
    <!-- Inner flame - red core -->
    <path d="M 0 -2 Q -2 1 -2 4 Q -2 7 0 9 Q 2 7 2 4 Q 2 1 0 -2" fill="#FF4500" stroke="none"/>
  </g>
  
  <!-- Shield shine/accent -->
  <path d="M 50 8 L 75 22 L 75 52 Q 75 72 50 88 Q 25 72 25 52 L 25 22 Z" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.4"/>
</svg>